<div class="auth-center">
  <div class="auth-card" style="max-width:420px;margin:auto;padding:40px;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12)">
    <div style="text-align:center;margin-bottom:24px">
      <mat-icon style="font-size:48px;width:48px;height:48px;color:var(--primary)">lock_reset</mat-icon>
      <h2>Forgot Password</h2>
      <p style="color:#666">Enter your email to receive a reset link</p>
    </div>

    <div *ngIf="submitted" style="background:var(--accent-light);padding:20px;border-radius:8px;text-align:center">
      <mat-icon style="color:#4caf50;font-size:48px;width:48px;height:48px">mark_email_read</mat-icon>
      <p style="margin-top:12px;font-weight:500">Reset link sent!</p>
      <p style="color:#666;font-size:0.875rem">Check your inbox and follow the instructions.</p>
      <a routerLink="/auth/login" mat-raised-button color="primary" style="margin-top:16px;display:inline-block">Back to Login</a>
    </div>

    <form *ngIf="!submitted" [formGroup]="form" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" formControlName="email">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error>Valid email required</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading" style="width:100%;height:48px;margin-top:8px;font-size:1rem">
        <mat-spinner diameter="20" *ngIf="loading" style="display:inline-block"></mat-spinner>
        <span *ngIf="!loading">Send Reset Link</span>
      </button>

      <div style="text-align:center;margin-top:16px">
        <a routerLink="/auth/login" style="color:var(--primary);text-decoration:none">Back to Login</a>
      </div>
    </form>
  </div>
</div>
