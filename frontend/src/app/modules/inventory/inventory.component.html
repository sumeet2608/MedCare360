<div class="fade-in">
  <div class="page-header">
    <div><h1>Inventory Management</h1><p>{{ total }} items tracked</p></div>
    <button mat-raised-button color="primary" (click)="showAddForm=!showAddForm"><mat-icon>add</mat-icon> Add Item</button>
  </div>

  <!-- Add Form -->
  <mat-card *ngIf="showAddForm" style="margin-bottom:16px;padding:20px;max-width:800px">
    <mat-card-header><mat-card-title>Add New Item</mat-card-title></mat-card-header>
    <mat-card-content>
      <div class="form-row">
        <mat-form-field appearance="outline"><mat-label>Item Name *</mat-label><input matInput [(ngModel)]="newItem.name"></mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Category *</mat-label>
          <mat-select [(ngModel)]="newItem.category">
            <mat-option *ngFor="let c of categories" [value]="c">{{ c | titlecase }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Quantity *</mat-label><input matInput type="number" [(ngModel)]="newItem.quantity"></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Location</mat-label><input matInput [(ngModel)]="newItem.location" placeholder="Ward/Room"></mat-form-field>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button mat-raised-button color="primary" (click)="addItem()" [disabled]="!newItem.name"><mat-icon>save</mat-icon> Save</button>
        <button mat-stroked-button (click)="showAddForm=false">Cancel</button>
      </div>
    </mat-card-content>
  </mat-card>

  <app-data-grid
    [columns]="columns"
    [rows]="items"
    [loading]="loading"
    searchPlaceholder="Search inventory..."
    exportFilename="inventory"
    emptyMessage="No inventory items found">

    <ng-template appGridCell="itemId" let-i><span style="font-size:0.75rem;font-weight:600;color:var(--primary)">{{ i.itemId }}</span></ng-template>
    <ng-template appGridCell="name" let-i><strong>{{ i.name }}</strong><br *ngIf="i.description"><small style="color:#666">{{ i.description }}</small></ng-template>
    <ng-template appGridCell="category" let-i>{{ i.category | titlecase }}</ng-template>
    <ng-template appGridCell="quantity" let-i><strong [style.color]="i.quantity <= i.minStockLevel ? '#f44336' : 'inherit'">{{ i.quantity }}</strong></ng-template>
    <ng-template appGridCell="condition" let-i><span class="status-chip" [class]="getConditionClass(i.condition)">{{ i.condition | titlecase }}</span></ng-template>
    <ng-template appGridCell="location" let-i>{{ i.location || '—' }}</ng-template>
    <ng-template appGridCell="actions" let-i>
      <button mat-icon-button color="warn" (click)="$event.stopPropagation(); delete(i._id)" matTooltip="Delete"><mat-icon>delete</mat-icon></button>
    </ng-template>
  </app-data-grid>
</div>
