[jenkins_server]
jenkins-server ansible_host=65.1.111.108 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/medcare-key.pem

[app_servers]
# Current EC2 running the backend (until EKS is ready)
app-server ansible_host=65.1.111.108 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/medcare-key.pem

[k8s_nodes]
# EKS worker nodes (populated after terraform apply)
# worker1 ansible_host=<EKS_NODE_IP> ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/medcare-key.pem

[monitoring]
# Prometheus/Grafana server (can be same as app server initially)
monitor-server ansible_host=65.1.111.108 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/medcare-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
project_name=medcare360
aws_region=ap-south-1
environment=production
