input {
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["medcare360", "application"]
  }
  beats {
    port => 5044
    tags => ["filebeat"]
  }
}

filter {
  if [tags] =~ "application" {
    mutate {
      add_field => {
        "service" => "medcare360-backend"
        "environment" => "${NODE_ENV:production}"
      }
    }

    if [level] == "error" {
      mutate { add_tag => ["alert"] }
    }

    date {
      match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
    }

    geoip {
      source => "ip"
      target => "geoip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "medcare360-logs-%{+YYYY.MM.dd}"
    template_name => "medcare360"
    template_overwrite => false
  }

  if "alert" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}
