apiVersion: apps/v1
kind: Deployment
metadata:
  name: medcare-frontend
  namespace: medcare360
  labels:
    app: medcare-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medcare-frontend
  template:
    metadata:
      labels:
        app: medcare-frontend
    spec:
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/medcare360-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medcare-frontend-svc
  namespace: medcare360
spec:
  selector:
    app: medcare-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
