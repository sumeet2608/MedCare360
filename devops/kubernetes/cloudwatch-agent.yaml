---
# CloudWatch Agent DaemonSet — ships all pod logs to CloudWatch
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-cloudwatch
  labels:
    name: amazon-cloudwatch

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudwatch-agent
  namespace: amazon-cloudwatch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudwatch-agent-role
rules:
  - apiGroups: [""]
    resources: [pods, nodes, endpoints]
    verbs: [list, watch]
  - apiGroups: ["apps"]
    resources: [replicasets]
    verbs: [list, watch]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [list, watch]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudwatch-agent-role-binding
subjects:
  - kind: ServiceAccount
    name: cloudwatch-agent
    namespace: amazon-cloudwatch
roleRef:
  kind: ClusterRole
  name: cloudwatch-agent-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cwagentconfig
  namespace: amazon-cloudwatch
data:
  cwagentconfig.json: |
    {
      "agent": { "region": "ap-south-1" },
      "logs": {
        "metrics_collected": {
          "kubernetes": {
            "cluster_name": "medcare360-eks",
            "metrics_collection_interval": 60
          }
        },
        "force_flush_interval": 5,
        "logs_collected": {
          "files": {
            "collect_list": [{
              "file_path": "/var/log/containers/medcare-backend*.log",
              "log_group_name": "/medcare360/production/backend",
              "log_stream_name": "k8s/{pod_name}",
              "from_beginning": true
            },{
              "file_path": "/var/log/containers/medcare-frontend*.log",
              "log_group_name": "/medcare360/production/frontend",
              "log_stream_name": "k8s/{pod_name}",
              "from_beginning": true
            }]
          }
        }
      }
    }

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudwatch-agent
  namespace: amazon-cloudwatch
spec:
  selector:
    matchLabels:
      name: cloudwatch-agent
  template:
    metadata:
      labels:
        name: cloudwatch-agent
    spec:
      serviceAccountName: cloudwatch-agent
      terminationGracePeriodSeconds: 60
      containers:
        - name: cloudwatch-agent
          image: amazon/cloudwatch-agent:1.247358.0b252275
          resources:
            limits:   { cpu: 200m, memory: 200Mi }
            requests: { cpu: 200m, memory: 200Mi }
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef: { fieldPath: status.hostIP }
            - name: HOST_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
          volumeMounts:
            - name: cwagentconfig
              mountPath: /etc/cwagentconfig
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: dockersock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: varlibdocker
              mountPath: /var/lib/docker
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: devdisk
              mountPath: /dev/disk
              readOnly: true
      volumes:
        - name: cwagentconfig
          configMap:
            name: cwagentconfig
        - name: rootfs
          hostPath: { path: / }
        - name: dockersock
          hostPath: { path: /var/run/docker.sock }
        - name: varlibdocker
          hostPath: { path: /var/lib/docker }
        - name: sys
          hostPath: { path: /sys }
        - name: devdisk
          hostPath: { path: /dev/disk }
