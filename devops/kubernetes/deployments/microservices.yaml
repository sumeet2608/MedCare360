---
# ── Patient Service ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: medcare360
  labels: { app: patient-service, tier: clinical }
spec:
  replicas: 2
  selector:
    matchLabels: { app: patient-service }
  template:
    metadata:
      labels: { app: patient-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: patient-service
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/medcare360/patient-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef: { name: medcare-config }
            - secretRef:    { name: medcare-secrets }
          env:
            - name: PORT
              value: "3002"
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "256Mi", cpu: "300m" }
          livenessProbe:
            httpGet: { path: /health, port: 3002 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 3002 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: medcare360
spec:
  selector: { app: patient-service }
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
