# ClusterIssuer — Let's Encrypt TLS certificates via cert-manager
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@medcare360.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medcare-ingress
  namespace: medcare360
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://medcare360.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
spec:
  tls:
    - hosts:
        - medcare360.com
        - www.medcare360.com
        - api.medcare360.com
      secretName: medcare-tls
  rules:
    - host: medcare360.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medcare-frontend-svc
                port:
                  number: 80
    - host: www.medcare360.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medcare-frontend-svc
                port:
                  number: 80
    - host: api.medcare360.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medcare-backend-svc
                port:
                  number: 5000
